<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Riservata - Media Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #004a99;
            --text-color: #333;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #e1ecf7;
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 400;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #003366;
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Dr. Giuseppe Musumeci</div>
        
        <div class="status-badge">SITO DI SERVIZIO</div>
        
        <h1>Accesso Limitato</h1>
        
        <p>
            Questo sottodominio è destinato esclusivamente a funzioni tecniche e alla gestione dei media. 
            <strong>Non è destinato alla consultazione pubblica.</strong>
        </p>

        <a href="https://www.drgiuseppemusumeci.com" class="btn">Torna al sito principale</a>

        <div class="footer-note">
            &copy; 2026 MD Giuseppe Musumeci - Tutti i diritti riservati.
        </div>
    </div>

</body>
</html>
